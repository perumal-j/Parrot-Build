---
# --- Fetch latest release metadata ---

- name: "Check the existence of caido-latest.json file in /tmp"
  stat:
    path: /tmp/caido-latest.json
  register: latest_caido_release_data
  changed_when: false

- name: "Downloading Latest Version of Caido"
  uri:
    url: "https://api.github.com/repos/caido/caido/releases/latest"
    method: GET
    headers:
      Authorization: "token {{ github_api_key }}"
    dest: /tmp/caido-latest.json
    mode: '0640'
  when: not latest_caido_release_data.stat.exists

- name: "Read caido-latest.json from disk"
  slurp:
    src: /tmp/caido-latest.json
  register: caido_release_file
  changed_when: false

- name: "Parse Release JSON"
  set_fact:
    caido_release_json: "{{ caido_release_file.content | b64decode | from_json }}"
  changed_when: false

- name: "Set Latest version of Caido"
  set_fact:
    caido_latest_version: "{{ caido_release_json.tag_name }}"
  changed_when: false

- name: "Show Latest version of Caido"
  debug:
    msg: "Latest version of Caido: {{ caido_latest_version }} Found."

# --- Compare against currently installed version ---

- name: "Check for existing version reference file"
  stat:
    path: /opt/current_caido_version.txt
  register: caido_version_file
  changed_when: false

- name: "Read currently installed version"
  slurp:
    src: /opt/current_caido_version.txt
  register: caido_installed_version_raw
  when: caido_version_file.stat.exists
  changed_when: false

- name: "Set installed version fact (from file)"
  set_fact:
    caido_installed_version: "{{ caido_installed_version_raw.content | b64decode | trim }}"
  when: caido_version_file.stat.exists
  changed_when: false

- name: "Set installed version fact (no file present yet)"
  set_fact:
    caido_installed_version: "none"
  when: not caido_version_file.stat.exists
  changed_when: false

- name: "Show installed vs latest version"
  debug:
    msg: "Installed: {{ caido_installed_version }} | Latest: {{ caido_latest_version }}"

- name: "Determine if update is required"
  set_fact:
    caido_update_required: "{{ caido_installed_version != caido_latest_version }}"

- name: "Show whether an update will be performed"
  debug:
    msg: "Update required: {{ caido_update_required }}"

- name: "Remove outdated binaries so download tasks re-trigger"
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /usr/local/bin/caido
    - /opt/caido
  become: true
  become_method: sudo
  when: caido_update_required and caido_installed_version != 'none'

# --- Download helper script (only needed if we're actually going to install/update) ---

- name: "Check the presence of /tmp/downloadcaido.sh"
  stat:
    path: /tmp/downloadcaido.sh
  register: caido_download_file
  changed_when: false
  when: caido_update_required

- name: "Copy downloadcaido.sh to /tmp/downloadcaido.sh"
  copy:
    src: downloadcaido.sh
    dest: /tmp/downloadcaido.sh
    mode: '0760'
  when: caido_update_required and not caido_download_file.stat.exists

- name: "Extracting Caido URL from JSON"
  shell: /tmp/downloadcaido.sh
  register: caido_url
  changed_when: false
  when: caido_update_required

# --- Install / update binary (only when a new version is available) ---

- name: "Check the existence of /usr/local/bin/caido"
  stat:
    path: /usr/local/bin/caido
  register: caido_binary_bash
  changed_when: false

- name: "Downloading Caido (bash wrapper location)"
  get_url:
    url: "{{ caido_url.stdout }}"
    dest: /usr/local/bin/caido
    mode: '0755'
  become: true
  when: caido_update_required

- name: "Change owner and group of the file"
  ansible.builtin.file:
    path: "/usr/local/bin/caido"
    owner: "{{ ansible_facts['user_id'] }}"
    group: "{{ ansible_facts['user_id'] }}"
    state: file
  become: true
  when: caido_update_required or caido_binary_bash.stat.exists

- name: "Check the existence of /opt/caido"
  stat:
    path: /opt/caido
  register: caido_binary
  changed_when: false

- name: "Downloading Caido (opt binary)"
  get_url:
    url: "{{ caido_url.stdout }}"
    dest: /opt/caido
    mode: '0755'
  become: true
  when: caido_update_required and ansible_facts['distribution'] == "Ubuntu"

- name: "Making Caido executable"
  shell: |
    echo -e '#!/bin/bash\n/opt/caido --no-sandbox' > /usr/local/bin/caido
    chmod +x /usr/local/bin/caido
  args:
    executable: /bin/bash
  become: true
  when: caido_update_required and ansible_facts['distribution'] == "Ubuntu"

# --- Record the newly installed version ---

- name: "Update version reference file after successful install"
  copy:
    content: "{{ caido_latest_version }}"
    dest: /opt/current_caido_version.txt
    mode: '0644'
  become: true
  become_method: sudo
  when: caido_update_required
